<style>
  /* Стили для карты ветра */
  #wind-map {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
  }

  /* Убираем элементы управления MapTiler */
  .maplibregl-ctrl-bottom-left,
  .maplibregl-ctrl-bottom-right {
    display: none !important;
  }
  
  /* index.css - добавьте */

/* Анимация пульса для маркера местоположения на карте ветра */
@keyframes wind-marker-pulse {
  0% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(-50%, -50%) scale(2.5);
    opacity: 0;
  }
}

.wind-my-location-pulse {
  animation: wind-marker-pulse 2s ease-out infinite;
}

/* Скрыть контролы MapTiler */
.maplibregl-ctrl-bottom-left,
.maplibregl-ctrl-bottom-right,
.maplibregl-ctrl-top-left,
.maplibregl-ctrl-top-right,
.maplibregl-ctrl-attrib,
.maplibregl-ctrl-logo,
.maptiler-ctrl {
  display: none !important;
}
</style>
